events {}

http {
    upstream user-service {
        server user-service:8083;
    }
    upstream product-service {
        server product-service:8082;
    }
    upstream order-service {
        server order-service:8081;
    }
    upstream delivery-service {
        server delivery-service:8084;
    }
    upstream frontend-service {
        server frontend-service:80;
    }

    server {
        listen 80;

        # 정적 페이지
        location / {
            proxy_pass http://frontend-service;
        }

        # User (login)
        location /api/login {
            proxy_pass http://user-service;
        }

        # Product
        location /api/products {
            proxy_pass http://product-service;
        }

        # Order (+ WebSocket /ws 는 order-service 쪽)
        location /api/orders {
            proxy_pass http://order-service;
        }

        # Delivery (관리자)
        location /api/deliveries {
            proxy_pass http://delivery-service;
        }

        # WebSocket (SockJS)
        location /ws {
            proxy_pass http://order-service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}
