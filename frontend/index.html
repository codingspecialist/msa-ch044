<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <title>chap044 · 고객 화면</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 640px; margin: 40px auto; padding: 0 16px; }
        h1 { border-bottom: 2px solid #444; padding-bottom: 8px; }
        .row { margin: 12px 0; }
        input, select, button { padding: 6px 10px; font-size: 14px; }
        button { cursor: pointer; }
        #log { background: #111; color: #0f0; padding: 12px; border-radius: 6px; font-family: monospace; white-space: pre-wrap; min-height: 120px; }
        .ok { color: #0a0; font-weight: bold; }
        .err { color: #c00; font-weight: bold; }
        .api { font-size: 12px; color: #666; margin-top: 4px; }
    </style>
</head>
<body>
<h1>고객 화면 (chap044)</h1>

<h3>⓪ API 서버</h3>
<div class="row">
    <input id="apiBase" size="40" value="http://localhost"/>
    <button onclick="saveApiBase()">저장</button>
    <div class="api">※ 프론트는 클러스터 외부(CDN/로컬)에서 실행. 백엔드 Ingress 주소를 지정하세요.</div>
</div>

<h3>① 로그인</h3>
<div class="row">
    <input id="username" placeholder="username" value="ssar"/>
    <input id="password" placeholder="password" value="1234" type="password"/>
    <button onclick="doLogin()">로그인</button>
</div>

<h3>② 주문</h3>
<div class="row">
    상품:
    <select id="productSelect">
        <option value="1">MacBook Pro (재고 10)</option>
        <option value="2">iPhone 15 (재고 0 → 실패/보상)</option>
        <option value="3">AirPods (재고 10)</option>
    </select>
    주소: <input id="address" value="Seoul"/>
    <button onclick="createOrder()">주문하기</button>
</div>

<h3>③ 관리자 시뮬레이션 (배송 완료)</h3>
<div class="row">
    <button onclick="completeDelivery()">배송 완료 처리</button>
    <span id="deliveryStatus" style="margin-left:12px; color:#666;"></span>
    <div class="api">※ 주문하기 후 이 버튼을 눌러야 주문이 최종 완료됩니다.</div>
</div>

<h3>로그</h3>
<div id="log">대기중...</div>

<script>
    // ---- API Base URL (외부에서 백엔드 Ingress로 접근) ----
    let API_BASE = localStorage.getItem('apiBase') || 'http://localhost';

    let token = null;
    let userId = null;
    let stomp = null;
    let lastOrderId = null;
    const $ = id => document.getElementById(id);
    const log = msg => { $('log').textContent += '\n' + msg; };

    // 초기 input 반영
    $('apiBase').value = API_BASE;

    function saveApiBase() {
        API_BASE = $('apiBase').value.replace(/\/+$/, '');
        localStorage.setItem('apiBase', API_BASE);
        log('🔧 API Base 저장: ' + API_BASE);
    }

    // base64url → base64 변환 후 atob (JWT payload 디코딩)
    function decodeJwt(tk) {
        const payload = tk.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
        const pad = payload.length % 4 === 0 ? '' : '='.repeat(4 - payload.length % 4);
        return JSON.parse(atob(payload + pad));
    }

    async function doLogin() {
        const res = await fetch(API_BASE + '/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: $('username').value, password: $('password').value})
        });
        if (!res.ok) { log('❌ 로그인 실패'); return; }
        const data = await res.json();
        token = data.token;
        userId = data.userId;
        log('✅ 로그인 성공: userId=' + userId);
        connectWebSocket();
    }

    function connectWebSocket() {
        // SockJS는 절대 URL 지원
        stomp = Stomp.over(new SockJS(API_BASE + '/ws'));
        stomp.debug = null;
        stomp.connect({}, () => {
            log('🔌 WebSocket 연결됨, /topic/orders/' + userId + ' 구독');
            stomp.subscribe('/topic/orders/' + userId, msg => {
                const data = JSON.parse(msg.body);
                if (data.status === 'COMPLETED') log('🎉 ' + data.message + ' (orderId=' + data.orderId + ')');
                else if (data.status === 'CANCELLED') log('💥 ' + data.message + ' (orderId=' + data.orderId + ')');
                else log('📨 ' + JSON.stringify(data));
            });
        });
    }

    async function createOrder() {
        if (!token) { log('먼저 로그인하세요'); return; }
        const body = {
            productId: parseInt($('productSelect').value, 10),
            quantity: 1,
            address: $('address').value
        };
        log('📤 주문 요청: ' + JSON.stringify(body));
        const res = await fetch(API_BASE + '/api/orders', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token},
            body: JSON.stringify(body)
        });
        if (!res.ok) { log('❌ 주문 실패'); return; }
        const order = await res.json();
        lastOrderId = order.id;
        log('🎯 주문 생성됨: orderId=' + order.id + ' (Saga 진행 중, WebSocket 대기...)');
        log('👉 ③번 "배송 완료 처리" 버튼을 눌러 주문을 완료하세요.');
    }

    async function completeDelivery() {
        if (!lastOrderId) { log('먼저 주문하기를 눌러주세요'); return; }
        const ds = $('deliveryStatus');
        ds.textContent = '조회 중...';

        const res = await fetch(API_BASE + '/api/deliveries');
        if (!res.ok) { log('❌ 배송 목록 조회 실패'); ds.textContent = ''; return; }
        const deliveries = await res.json();

        const delivery = deliveries.find(d => d.orderId === lastOrderId && d.status === 'READY');
        if (!delivery) {
            log('⚠️ 완료 처리할 배송 없음 (이미 완료됐거나 재고 부족으로 취소된 주문)');
            ds.textContent = '';
            return;
        }

        const res2 = await fetch(API_BASE + '/api/deliveries/' + delivery.id + '/complete', { method: 'PUT' });
        if (!res2.ok) { log('❌ 배송 완료 처리 실패'); ds.textContent = ''; return; }
        log('🚚 배송 완료 처리됨 (deliveryId=' + delivery.id + ') → WebSocket 대기...');
        ds.textContent = '';
    }
</script>
</body>
</html>
